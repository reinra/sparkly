name: Package Distribution

on:
  push:
    branches: ['**']

permissions:
  contents: write
  actions: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Build and package distribution
        run: npm run package:distribution

      - name: Generate metadata
        id: meta
        run: |
          echo "sha=$($env:GITHUB_SHA.Substring(0,5))" >> $env:GITHUB_OUTPUT
          echo "datetime=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> $env:GITHUB_OUTPUT

      - name: Zip distribution
        run: Compress-Archive -Path dist/sparkly-package/* -DestinationPath dist/sparkly-dev.zip

      - name: Delete existing release and update tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev-latest --yes 2>$null
          git tag -f dev-latest
          git push origin dev-latest --force

      - name: Create dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: 'Dev Build (${{ steps.meta.outputs.datetime }}-${{ steps.meta.outputs.sha }})'
          body: |
            Automated dev build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Date: ${{ github.event.head_commit.timestamp }}

            Commit: ${{ github.event.head_commit.message }}
          prerelease: true
          make_latest: false
          files: dist/sparkly-dev.zip
