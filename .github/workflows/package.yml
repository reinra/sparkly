name: Package Distribution

on:
  push:
    branches: ['**']

permissions:
  contents: write
  actions: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Build and package distribution
        run: npm run package:distribution

      - name: Generate short SHA and date
        id: slug
        run: |
          echo "sha=$($env:GITHUB_SHA.Substring(0,5))" >> $env:GITHUB_OUTPUT
          echo "date=$(Get-Date -Format 'yyyy-MM-dd')" >> $env:GITHUB_OUTPUT

      - name: Zip distribution
        run: Compress-Archive -Path dist/sparkly-package/* -DestinationPath dist/sparkly-dev.zip

      - name: Create or update dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.slug.outputs.date }}-${{ steps.slug.outputs.sha }}
          name: 'Dev Build (${{ steps.slug.outputs.date }}-${{ steps.slug.outputs.sha }})'
          body: |
            Automated dev build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Date: ${{ github.event.head_commit.timestamp }}

            Commit: ${{ github.event.head_commit.message }}
          prerelease: true
          files: dist/sparkly-dev.zip

  cleanup:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // List all releases, filter to dev pre-releases
            const releases = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100,
            });

            const devReleases = releases.data
              .filter(r => r.prerelease && r.tag_name.startsWith('dev-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Keep the 3 most recent, delete the rest
            const toDelete = devReleases.slice(3);

            for (const release of toDelete) {
              console.log(`Deleting old release: ${release.name} (${release.tag_name})`);

              // Delete the release
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });

              // Delete the associated tag
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (e) {
                console.log(`Could not delete tag ${release.tag_name}: ${e.message}`);
              }
            }

            console.log(`Kept ${Math.min(devReleases.length, 3)} releases, deleted ${toDelete.length}`);
