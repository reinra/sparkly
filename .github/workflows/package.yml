name: Package Distribution

on:
  push:
    branches: ['**']

jobs:
  package:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci

      - name: Build and package distribution
        run: npm run package:distribution

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: twinkly-server-dev-${{ github.sha }}
          path: dist/twinkly-server-package/
          retention-days: 90

  cleanup:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      actions: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // List all artifacts for this repo
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner,
              repo,
              per_page: 100,
            });

            // Filter to only twinkly-server-dev artifacts, sorted newest first
            const devArtifacts = artifacts.data.artifacts
              .filter(a => a.name.startsWith('twinkly-server-dev-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Keep the 3 most recent, delete the rest
            const toDelete = devArtifacts.slice(3);

            for (const artifact of toDelete) {
              console.log(`Deleting old artifact: ${artifact.name} (created ${artifact.created_at})`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }

            console.log(`Kept ${Math.min(devArtifacts.length, 3)} artifacts, deleted ${toDelete.length}`);
